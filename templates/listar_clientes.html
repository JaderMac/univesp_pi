<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meus clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>


    <h1>Adicionar novo cliente</h1>
    <form>
    <div class="mb-3">
        <label for="nomeNovocliente" class="form-label">Nome:</label>
        <input class="form-control" id="nomeNovoCliente" aria-describedby="nomeNovoCliente">
    </div>

    <div class="mb-3">
        <label for="celularNovocliente" class="form-label">Celular:</label>
        <input class="form-control" id="celularNovocliente" aria-describedby="celularNovocliente">
    </div>

    <div class="mb-3">
        <label for="emailNovocliente" class="form-label">Email:</label>
        <input type="email" class="form-control" id="emailNovocliente" aria-describedby="emailNovocliente">
    </div>
      <button type="submit" class="btn btn-primary">Cadastrar Novo Cliente</button>
    </form>

    <h1>Lista de clientes</h1>
      <table class="table">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nome</th>
            <th scope="col">Celular</th>
            <th scope="col">Email</th>
            <th scope="col">Ações</th>
          </tr>
        </thead>
        <tbody>
          {%for cliente in clientesd%}  
          <tr>
            <th scope="row">{{cliente.id}}</th>
            <td>{{cliente.nome}}</td>
            <td>{{cliente.celular}}</td>
            <td>{{cliente.email}}</td>
            <td><button id="editarCliente" type="button" class="btn btn-primary">Editar Cliente</button>
            <button id="deletarCliente" type="button" class="btn btn-danger">Deletar Cliente</button></td>          
          </tr>
          {% endfor %}
        </tbody>
      </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
