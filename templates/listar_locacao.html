<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minhas locações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Adicionar locação</h1>
    <form>
    <div class="mb-3">
        <label for="nomeNovaLocacao" class="form-label">Nome:</label>
        <input class="form-control" id="nomeNovaLocacao" aria-describedby="nomeNovaLocacao">
    </div>

    <div class="mb-3">
        <label for="descricaoNovaLocacao" class="form-label">Descrição:</label>
        <input class="form-control" id="descricaoNovaLocacao" aria-describedby="descricaoNovaLocacao">
    </div>

    <div class="mb-3">
        <label for="valorDiariaNovaLocacao" class="form-label">Valor Diária:</label>
        <input class="form-control" id="valorDiariaNovaLocacao" aria-describedby="valorDiariaNovaLocacao">
    </div>
      <button type="submit" class="btn btn-primary">Cadastrar Nova Locação</button>
    </form>


    <h1>Lista de locações</h1>
      <table class="table">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nome</th>
            <th scope="col">Descrição</th>
            <th scope="col">Valor da Diaria</th>
            <th scope="col">Ações</th>
          </tr>
        </thead>
        <tbody>
          {%for locacao in locacoesdoc%}  
          <tr>
            <th scope="row">{{locacao.id}}</th>
            <td>{{locacao.nome}}</td>
            <td>{{locacao.descricao}}</td>
            <td>{{locacao.valordiaria}}</td>
            <td><button id="editar" type="button" class="btn btn-primary">Editar</button>
            <button id="deletar" type="button" class="btn btn-danger">Deletar</button></td>          
          </tr>
          {% endfor %}
        </tbody>
      </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
